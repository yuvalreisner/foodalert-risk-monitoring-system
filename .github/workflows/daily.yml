name: Daily FoodSafe Pipeline

on:
  schedule:
    - cron: '0 5 * * *'   # 5:00 UTC = 8:00 Israel time (UTC+3 summer)
  workflow_dispatch:        # manual trigger from GitHub UI
    inputs:
      notify_date:
        description: 'Date to check for email notifications (YYYY-MM-DD). Leave empty for today.'
        required: false
        default: ''

permissions:
  contents: write           # needed to commit DB + dashboard back to repo

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Cache pip packages — reinstall only when requirements.txt changes
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Cache the model between runs — 320MB, no need to re-download daily
      - name: Cache model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: models/
          key: model-bi-encoder-v3

      - name: Download model from GitHub Release
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p models/bi_encoder_labeling_v3
          gh release download v1.0 \
            --pattern "best_model.pt" \
            --dir models/bi_encoder_labeling_v3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Daily pipeline ──────────────────────────────────────────────────────
      - name: Ingest new alerts (smart per-source window)
        run: python3 scripts/ingest.py --smart

      - name: Score new alerts
        run: python3 scripts/score_all_alerts.py

      - name: Compute counterfactuals for new Critical/High alerts
        run: python3 scripts/counterfactuals.py --tier critical,high --window 90

      - name: Generate dashboard
        run: python3 scripts/generate_dashboard.py --window 90 --out docs/index

      # ── Commit results back to repo ─────────────────────────────────────────
      - name: Send email notifications for high-risk alerts
        run: |
          DATE="${{ github.event.inputs.notify_date }}"
          if [ -z "$DATE" ]; then DATE=$(date -u +%Y-%m-%d); fi
          python3 scripts/notify.py --date "$DATE"
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name  "FoodSafe Bot"
          git config user.email "foodsafe-bot@users.noreply.github.com"
          git add data/alerts.db reports/counterfactuals.json docs/index.html
          git diff --cached --quiet || \
            git commit -m "Dashboard update $(date -u +%Y-%m-%d)" && \
            git push
