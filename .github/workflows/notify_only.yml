name: Send Email Notification (test)

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to check (YYYY-MM-DD). Leave empty for today.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — print what would be sent without sending'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send notification
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then DATE=$(date -u +%Y-%m-%d); fi
          DRY="${{ github.event.inputs.dry_run }}"
          if [ "$DRY" = "true" ]; then
            python3 scripts/notify.py --date "$DATE" --dry-run
          else
            python3 scripts/notify.py --date "$DATE"
          fi
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
